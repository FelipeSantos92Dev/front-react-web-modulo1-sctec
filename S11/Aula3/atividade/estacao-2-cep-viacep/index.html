<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransLog SC — Cadastro de ponto de coleta</title>
  <meta name="description" content="Autopreenchimento de endereço pelo CEP via ViaCEP para a transportadora TransLog SC." />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <main class="container">
    <h1>Cadastro de ponto de coleta</h1>
    <p class="legenda">Digite o CEP e saia do campo: o endereço se preenche sozinho.</p>

    <!-- form com label/for ligando rótulo ao campo (a11y, herança da A1) -->
    <form id="form-endereco" class="form-endereco">
      <div class="campo">
        <label for="input-cep">CEP</label>
        <input type="text" id="input-cep" name="cep" placeholder="88010-000" autocomplete="off"
          inputmode="numeric" maxlength="9" />
      </div>

      <!-- REGIÃO VIVA: anuncia carregando/erro ao leitor de tela sem mover o foco -->
      <p id="status" aria-live="polite" role="status"></p>

      <div class="campo">
        <label for="input-rua">Rua</label>
        <input type="text" id="input-rua" name="rua" />
      </div>
      <div class="campo">
        <label for="input-bairro">Bairro</label>
        <input type="text" id="input-bairro" name="bairro" />
      </div>
      <div class="campo">
        <label for="input-cidade">Cidade</label>
        <input type="text" id="input-cidade" name="cidade" />
      </div>
      <div class="campo">
        <label for="input-uf">UF</label>
        <input type="text" id="input-uf" name="uf" maxlength="2" />
      </div>
      <div class="campo">
        <label for="input-numero">Número</label>
        <input type="text" id="input-numero" name="numero" inputmode="numeric" />
      </div>
    </form>
  </main>

  <script src="./main.js" defer></script>
</body>

</html>
