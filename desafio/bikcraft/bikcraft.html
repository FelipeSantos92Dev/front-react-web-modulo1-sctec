<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikcraft</title>
    <!-- Integrar o CSS com o HTML -->
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <header>
        <img src="https://www.origamid.com/projetos/bikcraft/img/bikcraft.svg" alt="Logo da Bikcraft">

        <nav>
            <a href="#">Bicicletas</a>
            <a href="#">Seguros</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <section class="hero">
        <div class="coluna1">
            <div class="introducao">
                <h1>Bicicletas feitas sob medida<span class="cor-destaque">.</span></h1>
                <p id="subtitulo-introducao">Bicicletas elétricas de alta precisão e qualidade, feitas sob medida para você. Explore o mundo na
                    sua velocidade com a Bikcraft.</p>
                <button id="btn-escolha" class="btn-escolha">ESCOLHA A SUA</button>
            </div>
        </div>
        <div class="coluna2">
            <img class="foto-introducao" src="https://www.origamid.com/projetos/bikcraft/img/fotos/introducao.jpg"
                alt="Foto de uma bicicleta">
        </div>
        <!-- 2 colunas (1 textual | imagem) -->
        <!-- 
        pai -> flex row (horizontal)
         filho1 (coluna 50%)
         filho2 (coluna 50%)
         -->
    </section>

    <section class="escolha-sua">
        <h2>escolha a sua<span class="cor-destaque">.</span></h2>

        <div id="mostruarioID" class="mostruario-bikes">
            <div class="bike">
                <img class="foto-bike" src="https://www.origamid.com/projetos/bikcraft/img/bicicletas/magic-home.jpg"
                    alt="Magic Might">
                <p class="nome-bike">Magic Might</p>
                <p class="preco-bike">R$ 2499</p>
            </div>

            <div class="bike">
                <img class="foto-bike" src="https://www.origamid.com/projetos/bikcraft/img/bicicletas/nimbus-home.jpg"
                    alt="Nimbus Stark">
                <p class="nome-bike">Nimbus Stark</p>
                <p class="preco-bike">R$ 4999</p>
            </div>

            <div class="bike">
                <img class="foto-bike" src="https://www.origamid.com/projetos/bikcraft/img/bicicletas/nebula-home.jpg"
                    alt="Nebula Cosmic">
                <p class="nome-bike">Nebula Cosmic</p>
                <p class="preco-bike">R$ 3999</p>
            </div>
        </div>

    </section>


    <script src="script.js"></script>
</body>

</html>
